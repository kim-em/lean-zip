name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    # Shipped library + test driver. No Rust toolchain: the comparator
    # apparatus lives in the dev-only bench/ sub-package (see the `bench` job).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev pkg-config

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake build
        id: cache
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'Zip/**/*.lean', 'c/**') }}
          restore-keys: lake-

      - name: Clean stale Lake cache on fallback restore
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          # Lake caches run_io results (like moreLinkArgs) deeply in .lake/.
          # When restored from a fallback key, lakefile.lean may have changed
          # but cached run_io results are stale. Nuclear clean is the only
          # reliable way to force re-evaluation.
          rm -rf .lake

      - name: Build
        run: lake -R build

      - name: Test
        run: lake -R test

  bench:
    # Dev-only bench/ sub-package: the Track D comparators and the
    # bench/sweep/fuzz executables. This is the only job that needs a Rust
    # toolchain (for the miniz_oxide shim). The libdeflate and zopfli C-library
    # comparators are left disabled here (their headers are not installed) so
    # they compile as stubs — their enabled link paths depend on nix-supplied
    # `-L`/rpath flags and are exercised by `bench/run.sh` in the project
    # nix-shell, not on the bare Ubuntu runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev pkg-config cargo

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake build
        id: cache
        uses: actions/cache@v4
        with:
          # The bench package builds the parent Zip library into the root
          # .lake/, then its own targets into bench/.lake/ — cache both.
          path: |
            .lake
            bench/.lake
          key: bench-v2-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'Zip/**/*.lean', 'c/**', 'bench/lean-toolchain', 'bench/lake-manifest.json', 'bench/lakefile.lean', 'bench/**/*.lean', 'bench/c/**', 'bench/rust/**') }}
          restore-keys: bench-v2-

      - name: Clean stale Lake cache on fallback restore
        if: steps.cache.outputs.cache-hit != 'true'
        run: rm -rf .lake bench/.lake

      # Build straight from the committed bench/lake-manifest.json — `lake build`
      # materializes the pinned git dependency (zipCommon) itself, so this also
      # verifies the checked-in manifest is sufficient (no `lake update` needed).
      - name: Build bench package
        run: cd bench && lake -R build

      - name: Test bench package
        run: cd bench && lake -R test

  l6-gate:
    # Cold single-shot L6 whole-tar dominance gate. Fetches Silesia, assembles
    # the whole silesia.tar, builds the dev-only `bench` exe (needs the Rust
    # miniz_oxide shim, like the `bench` job), and runs bench/l6_tar_gate.sh:
    # it FAILS if lean native DEFLATE L6 stops strictly beating miniz_oxide L6
    # on the whole tar in size AND cold single-shot time. Cold is load-bearing
    # — see bench/l6_tar_gate.sh for why an in-process warm loop would mask the
    # regression this gate exists to catch.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev pkg-config cargo bc

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake build
        id: cache
        uses: actions/cache@v4
        with:
          # Mirror the `bench` job: the bench package builds the parent Zip
          # library into the root .lake/, then its own targets into bench/.lake/.
          path: |
            .lake
            bench/.lake
          key: bench-v2-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'Zip/**/*.lean', 'c/**', 'bench/lean-toolchain', 'bench/lake-manifest.json', 'bench/lakefile.lean', 'bench/**/*.lean', 'bench/c/**', 'bench/rust/**') }}
          restore-keys: bench-v2-

      - name: Clean stale Lake cache on fallback restore
        if: steps.cache.outputs.cache-hit != 'true'
        run: rm -rf .lake bench/.lake

      - name: Build the bench exe
        run: cd bench && lake -R build bench

      - name: Fetch Silesia corpus
        run: bash bench/fetch_corpora.sh silesia

      - name: Assemble silesia.tar
        # Concatenate the 12 Silesia files (fixed, sorted order) into one tar so
        # the gate compresses a ~202 MB whole-tar payload, matching the
        # `hyperfine zip silesia.tar` benchmark the gate defends.
        run: |
          tar --sort=name --owner=0 --group=0 --numeric-owner \
              --mtime='2020-01-01 00:00:00' \
              -cf silesia.tar -C bench/corpora/silesia \
              dickens mozilla mr nci ooffice osdb reymont samba sao webster x-ray xml
          ls -l silesia.tar

      - name: Run the cold L6 whole-tar gate
        # Pin to the idlest core so the cold ratio is not corrupted by scheduler
        # migration / SMT contention with concurrent runner work.
        run: bash bench/pin_core.sh bash bench/l6_tar_gate.sh silesia.tar 9

  animation-sync:
    # The committed compress-Pareto animation must match what
    # bench/pareto_history.py renders from the current latest.json git
    # history. bench/run.sh regenerates it after every dashboard refresh, but a
    # PR can still commit bench/results/latest.json without re-running that step
    # (as #2821-#2825 did, leaving the README animation 5 frames stale). This
    # check replays the history and fails if the committed SVG is out of date.
    #
    # No Lean build: pareto_history.py's SMIL-SVG output is pure-Python float
    # math rounded to 1-2 dp, verified byte-identical across environments, so a
    # bare python3 + matplotlib regenerate-and-diff is a reliable required check.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # pareto_history.py replays `git log` of latest.json — needs full history.
          fetch-depth: 0

      - name: Install matplotlib
        run: pip install matplotlib

      - name: Regenerate the animation from committed history
        run: python3 bench/pareto_history.py

      - name: Fail if the committed animation is stale
        run: |
          if ! git diff --exit-code bench/graphs/silesia_compress_pareto_history.svg; then
            echo "::error::bench/graphs/silesia_compress_pareto_history.svg is out of sync with bench/results/latest.json." \
                 "Run 'python3 bench/pareto_history.py' (or bench/run.sh) and commit the result."
            exit 1
          fi
