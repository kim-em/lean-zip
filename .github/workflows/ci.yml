name: CI

on:
  push:
    branches: [master, diag/lake-trace-fresh]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev pkg-config strace

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lake build
        id: cache
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'Zip/**/*.lean', 'c/**') }}
          restore-keys: lake-

      - name: Clean stale Lake cache on fallback restore
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          # Lake caches run_io results (like moreLinkArgs) deeply in .lake/.
          # When restored from a fallback key, lakefile.lean may have changed
          # but cached run_io results are stale. Nuclear clean is the only
          # reliable way to force re-evaluation.
          rm -rf .lake

      - name: Build
        run: |
          set +e
          strace -ff -y -o /tmp/lake-build.strace \
            -e trace=openat,read,write,lseek,ftruncate,close,fcntl,flock,clone,fork,vfork,execve \
            lake -R build
          status=$?
          echo "=== filtered build strace ==="
          grep -nE 'lakefile\.olean\.trace|lakefile\.olean|config/\[anonymous\]|zipCommon/.lake/config' /tmp/lake-build.strace.* || true
          echo "=== root trace context ==="
          first_match="$(grep -n '/\\.lake/config/\\[anonymous\\]/lakefile\\.olean\\.trace' /tmp/lake-build.strace.* | head -n1 || true)"
          if [ -n "$first_match" ]; then
            file="$(printf '%s' "$first_match" | cut -d: -f1)"
            line="$(printf '%s' "$first_match" | cut -d: -f2)"
            start=$(( line > 40 ? line - 40 : 1 ))
            end=$(( line + 120 ))
            sed -n "${start},${end}p" "$file"
          fi
          echo "=== writer pid traces ==="
          grep 'lakefile\\.olean\\.trace' /tmp/lake-build.strace.* | grep 'write(' | sed -E 's#.*/lake-build\\.strace\\.([0-9]+):.*#\\1#' | sort -u | while read -r pid; do
            echo "--- pid $pid ---"
            sed -n '1,220p' "/tmp/lake-build.strace.$pid"
          done
          exit $status

      - name: Inspect Lake config traces
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          trace_paths = sorted(Path(".lake").glob("**/*.olean.trace"))
          print("TRACE_FILES", len(trace_paths))
          for path in trace_paths:
            data = path.read_bytes()
            print(f"TRACE {path} size={len(data)}")
            print(repr(data))
            try:
              parsed = json.loads(data)
            except Exception as exc:
              print(f"JSON_ERROR {path}: {exc}")
            else:
              print(f"JSON_OK {path}: {parsed}")
          PY

      - name: Test
        run: |
          set +e
          strace -f -o /tmp/lake-exe-test.strace -e trace=openat,read,close,fcntl,flock lake -R exe test
          status=$?
          echo "lake exe test exit status: $status"
          echo "=== filtered strace ==="
          grep -nE 'olean(\.trace)?|config/\[anonymous\]|zipCommon/.lake/config' /tmp/lake-exe-test.strace || true
          exit $status
